# golangci-lint v2 config.
# Start conservative; enable more linters as the codebase grows.
version: "2"

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gosec
    - revive

issues:
  # Don't block on TODOs in scaffolded stubs.
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
